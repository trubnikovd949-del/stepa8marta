<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта, любимая бабушка!</title>
    <style>
        body {
            margin: 0;
            padding: 20px; /* Добавил отступы */
            font-family: 'Arial', sans-serif;
            background-color: #ffe6ea;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Изменил с center на flex-start */
            min-height: 100vh;
            text-align: center;
            overflow-y: auto; /* Разрешил вертикальную прокрутку */
            overflow-x: hidden; /* Запретил горизонтальную */
        }

        /* Экран с кнопкой */
        #start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease;
            min-height: 80vh; /* Чтобы кнопка была примерно по центру */
            width: 100%;
        }

        /* Стиль кнопки в виде цветов */
        .flower-button {
            background: url('https://img.freepik.com/free-vector/watercolor-flowers-bouquet_1308-38668.jpg?w=1380&t=st=1709640000~exp=1709640600~hmac=abcdef123456') no-repeat center center; 
            background-size: cover;
            border: none;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 105, 180, 0.4);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            outline: none;
        }

        /* Добавляем текст поверх цветов */
        .flower-button::after {
            content: "Нажми меня";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            color: #d63384;
            font-size: 1.2rem;
        }

        .flower-button:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 35px rgba(255, 105, 180, 0.6);
        }

        /* Экран с открыткой (скрыт по умолчанию) */
        #card-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 30px 20px; /* Увеличил padding */
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 500px;
            border: 5px solid #ffb6c1;
            animation: popIn 0.8s ease;
            margin: 20px auto; /* Отступы сверху и снизу */
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            color: #d63384;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* Настройки видео */
        video {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            max-height: 400px;
            object-fit: cover;
        }

        .heart {
            color: red;
            font-size: 2rem;
            animation: beat 1s infinite;
        }

        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Адаптивность для мобильных */
        @media (max-width: 600px) {
            h1 {
                font-size: 1.5rem;
            }
            p {
                font-size: 1rem;
            }
            body {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- ЭКРАН 1: Кнопка -->
    <div id="start-screen">
        <!-- Кнопка с фоновым изображением цветов -->
        <button class="flower-button" onclick="openCard()"></button>
        <p style="margin-top: 20px; color: #d63384; font-weight: bold;">Для любимой мамы и бабушки</p>
    </div>

    <!-- ЭКРАН 2: Открытка -->
    <div id="card-screen">
        <h1>С 8 Марта, мама и бабушка! ❤️</h1>
        
        <!-- Видео -->
        <!-- Замените 'video.mp4' на имя вашего файла -->
        <video id="greeting-video" autoplay muted loop playsinline>
            <source src="степа.mp4" type="video/mp4">
            Ваш браузер не поддерживает видео.
        </video>

        <p>
            Дорогие, мама и бабушка!<br>
            Поздравляю вас с праздником весны!<br>
            Желаю вам здоровья, счастья и долгих лет жизни.<br>
            Вы самые лучшие!
        </p>
        <div class="heart">💖</div>
    </div>

    <script>
        function openCard() {
            // 1. Скрываем кнопку
            const startScreen = document.getElementById('start-screen');
            startScreen.style.opacity = '0';
            
            // Ждем пока исчезнет, затем убираем из потока и показываем открытку
            setTimeout(() => {
                startScreen.style.display = 'none';
                
                const cardScreen = document.getElementById('card-screen');
                cardScreen.style.display = 'flex';
                
                // Прокручиваем страницу вверх после открытия открытки
                window.scrollTo({ top: 0, behavior: 'smooth' });
                
                // 2. Запускаем видео и замедляем его
                const video = document.getElementById('greeting-video');
                video.playbackRate = 0.5; // Скорость в 2 раза меньше (0.5 от обычной)
                video.play();
            }, 1000); // 1000 миллисекунд = 1 секунда задержки для плавности
        }
    </script>

</body>
</html>
